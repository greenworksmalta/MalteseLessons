<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d6b6a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Malti">
<title>Malti — Maltese Lessons</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#faf6ec;--card:#ffffff;--ink:#1f2933;--ink-2:#56616d;
    --primary:#0d6b6a;--primary-2:#0a5453;--accent:#e07b00;
    --good:#2d8a3e;--good-bg:#dff5e3;--bad:#c14545;--bad-bg:#fde4e4;
    --line:#e7e1d2;--shadow:0 1px 0 rgba(0,0,0,.04), 0 6px 18px rgba(20,30,40,.06);
    --radius:18px;--tap:64px;--maxw:520px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Lexend',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;letter-spacing:.01em;font-size:18px;line-height:1.55;overscroll-behavior-y:contain}
  body{min-height:100dvh;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  main{max-width:var(--maxw);margin:0 auto;padding:8px 18px 140px}
  button{font-family:inherit;font-size:inherit;letter-spacing:inherit;cursor:pointer}
  h1,h2,h3{margin:0 0 .3em;line-height:1.2;letter-spacing:.005em}
  h1{font-size:1.7rem;font-weight:700}
  h2{font-size:1.3rem;font-weight:600}
  h3{font-size:1.05rem;font-weight:600;color:var(--ink-2)}
  p{margin:0 0 .8em}
  .mt{font-weight:600;color:var(--primary-2);letter-spacing:.005em}

  .topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:8px;padding:10px 0;background:var(--bg)}
  .topbar .back{flex:0 0 auto;width:44px;height:44px;border:none;background:transparent;font-size:1.4rem;color:var(--ink-2);border-radius:12px}
  .topbar .back:active{background:var(--line)}
  .topbar .title{flex:1;min-width:0;font-weight:600;font-size:1rem;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .topbar .xp{flex:0 0 auto;font-weight:600;color:var(--accent);font-size:.95rem;display:flex;align-items:center;gap:4px}

  .progress{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:14px}
  .progress > div{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width .35s ease;width:0%}

  .card{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
  .card .audio-btn{margin-left:auto}

  .hero{background:linear-gradient(135deg,var(--primary),#11827f);color:#fff;border-radius:var(--radius);padding:22px;margin-bottom:18px;box-shadow:var(--shadow)}
  .hero h1{margin:0;color:#fff}
  .hero p{margin:4px 0 0;opacity:.9}
  .hero .sub{font-size:.9rem;opacity:.85;margin-top:6px;letter-spacing:.04em;text-transform:uppercase}

  .section-list{display:flex;flex-direction:column;gap:12px}
  .section-card{display:grid;grid-template-columns:56px 1fr 24px;gap:14px;align-items:center;padding:18px;background:var(--card);border:none;border-radius:var(--radius);box-shadow:var(--shadow);text-align:left;width:100%;color:var(--ink);transition:transform .12s ease}
  .section-card:active{transform:scale(.985)}
  .section-card .icon{width:56px;height:56px;border-radius:16px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:1.7rem}
  .section-card .meta strong{display:block;font-size:1.1rem;font-weight:700}
  .section-card .meta span{display:block;font-size:.92rem;color:var(--ink-2);margin-top:2px}
  .section-card .chev{color:var(--ink-2);font-size:1.3rem;justify-self:end}
  .section-card .pct{display:inline-block;margin-top:6px;font-size:.78rem;font-weight:600;color:var(--primary)}
  .section-card .barwrap{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:6px}
  .section-card .barwrap > div{height:100%;background:var(--primary);width:0%}
  .section-card.done .icon{background:var(--good-bg)}
  .section-card.done .pct{color:var(--good)}

  .module-label{font-size:.78rem;color:var(--ink-2);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin:18px 4px 8px}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:var(--tap);padding:0 22px;border-radius:14px;border:none;background:var(--primary);color:#fff;font-weight:600;font-size:1.05rem;width:100%;transition:transform .1s ease, background .15s ease;margin-top:8px}
  .btn:active{transform:scale(.98)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.secondary{background:var(--card);color:var(--ink);border:2px solid var(--line)}
  .btn.ghost{background:transparent;color:var(--primary);border:2px solid var(--primary);font-weight:600}

  .audio-btn{flex:0 0 auto;width:48px;height:48px;border-radius:50%;border:none;background:var(--primary);color:#fff;font-size:1.2rem;display:inline-flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
  .audio-btn:active{transform:scale(.94)}
  .audio-btn.playing{animation:pulse 1.2s ease-out infinite}
  .audio-btn.sm{width:38px;height:38px;font-size:.95rem}
  .audio-btn.lg{width:64px;height:64px;font-size:1.6rem}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(13,107,106,.45)}100%{box-shadow:0 0 0 14px rgba(13,107,106,0)}}

  .flash{min-height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px 18px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);position:relative}
  .flash .mtword{font-size:2rem;font-weight:700;color:var(--primary-2);margin:6px 0 10px;letter-spacing:.005em;line-height:1.2}
  .flash .enword{font-size:1.15rem;color:var(--ink-2);margin-top:2px;min-height:1.4em}
  .flash .audio-btn{margin-top:12px;width:64px;height:64px;font-size:1.6rem}
  .flash .hint{position:absolute;top:12px;right:14px;font-size:.78rem;color:var(--ink-2);opacity:.6;letter-spacing:.04em;text-transform:uppercase}
  .flash .alt{color:var(--ink-2);font-size:.95rem;margin-top:-4px}

  .choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .choices.col{grid-template-columns:1fr}
  .choice{min-height:var(--tap);background:var(--card);border:2px solid var(--line);border-radius:14px;padding:14px;font-size:1.05rem;font-weight:600;color:var(--ink);text-align:center;transition:transform .1s ease, background .15s ease, border-color .15s ease;letter-spacing:.005em}
  .choice:active{transform:scale(.98)}
  .choice.right{background:var(--good-bg);border-color:var(--good);color:var(--good)}
  .choice.wrong{background:var(--bad-bg);border-color:var(--bad);color:var(--bad)}
  .choice.dim{opacity:.45}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;justify-content:center}
  .chip{min-height:54px;min-width:64px;padding:0 16px;border-radius:14px;background:var(--card);border:2px solid var(--line);font-weight:700;font-size:1.1rem;color:var(--primary-2);transition:transform .1s ease, background .15s ease, border-color .15s ease}
  .chip:active{transform:scale(.96)}
  .chip.right{background:var(--good-bg);border-color:var(--good);color:var(--good)}
  .chip.wrong{background:var(--bad-bg);border-color:var(--bad);color:var(--bad)}

  .built{min-height:60px;background:var(--bg);border:2px dashed var(--line);border-radius:14px;padding:10px;display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start}
  .pool{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
  .tile{padding:8px 14px;background:var(--card);border:2px solid var(--line);border-radius:10px;font-weight:600;font-size:1rem;color:var(--primary-2)}
  .tile.used{visibility:hidden}

  .match{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
  .match button{min-height:58px;padding:10px;border-radius:12px;border:2px solid var(--line);background:var(--card);font-weight:600;font-size:.95rem;color:var(--ink);text-align:center;letter-spacing:.005em}
  .match button.sel{border-color:var(--primary);background:#e9f5f5}
  .match button.right{background:var(--good-bg);border-color:var(--good);color:var(--good);pointer-events:none}
  .match button.wrong{background:var(--bad-bg);border-color:var(--bad);color:var(--bad)}

  .feedback{position:fixed;left:0;right:0;bottom:0;padding:14px 18px calc(14px + env(safe-area-inset-bottom));background:var(--card);border-top:2px solid var(--line);transform:translateY(120%);transition:transform .25s ease;z-index:20;max-width:var(--maxw);margin:0 auto;border-radius:18px 18px 0 0}
  .feedback.show{transform:translateY(0)}
  .feedback.good{background:var(--good-bg);border-color:var(--good)}
  .feedback.bad{background:var(--bad-bg);border-color:var(--bad)}
  .feedback h3{margin:0 0 4px;font-size:1rem}
  .feedback.good h3{color:var(--good)}
  .feedback.bad h3{color:var(--bad)}
  .feedback p{margin:0;font-size:.95rem;color:var(--ink-2)}
  .feedback .row{display:flex;align-items:center;gap:12px}
  .feedback .row > div{flex:1;min-width:0}
  .feedback .next{flex:0 0 auto;min-height:50px;padding:0 22px;border-radius:12px;background:var(--ink);color:#fff;border:none;font-weight:700}
  .feedback.good .next{background:var(--good)}
  .feedback.bad .next{background:var(--bad)}

  .letter-card{display:flex;flex-direction:column;align-items:center;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;text-align:center}
  .letter-card .big{font-size:5rem;font-weight:700;color:var(--primary-2);line-height:1;margin:6px 0 4px}
  .letter-card .lower{font-size:1.3rem;color:var(--ink-2);margin-bottom:14px}
  .letter-card .examples{display:flex;flex-direction:column;gap:10px;width:100%;margin-top:8px}
  .letter-card .ex{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg);border-radius:12px;text-align:left}
  .letter-card .ex .audio-btn{width:42px;height:42px;font-size:1rem}
  .letter-card .ex .mt{font-weight:700;font-size:1.05rem}
  .letter-card .ex .en{color:var(--ink-2);font-size:.92rem;margin-left:auto}

  .passage-line{display:flex;align-items:flex-start;gap:12px;padding:12px;background:var(--card);border-radius:12px;margin-bottom:8px;box-shadow:var(--shadow)}
  .passage-line .audio-btn{flex:0 0 auto;width:40px;height:40px;font-size:.95rem;margin-top:2px}
  .passage-line .txt .mt{font-weight:700;color:var(--primary-2);display:block;margin-bottom:2px;font-size:1.02rem}
  .passage-line .txt .en{color:var(--ink-2);font-size:.92rem}

  .rule h2{display:flex;align-items:center;gap:10px;font-size:1.15rem}
  .rule .letters{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 12px}
  .rule .letters span{padding:6px 12px;background:var(--bg);border-radius:99px;font-weight:700;color:var(--primary-2);min-width:34px;text-align:center}
  .rule .examples-grid{display:flex;flex-direction:column;gap:6px;margin-top:8px}
  .rule .examples-grid .ex{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg);border-radius:10px}
  .rule .examples-grid .ex .audio-btn{width:36px;height:36px;font-size:.85rem}
  .rule .examples-grid .ex .full{font-weight:700;color:var(--primary-2)}
  .rule .examples-grid .ex .en{margin-left:auto;color:var(--ink-2);font-size:.9rem;text-align:right}

  /* multi-form (colour/adjective/fruit) card */
  .forms{display:flex;flex-direction:column;gap:8px}
  .form-row{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg);border-radius:10px}
  .form-row .audio-btn{width:38px;height:38px;font-size:.95rem;flex:0 0 auto}
  .form-row .label{flex:0 0 auto;font-size:.72rem;color:var(--ink-2);font-weight:700;letter-spacing:.04em;text-transform:uppercase;min-width:54px}
  .form-row .mtform{font-weight:700;color:var(--primary-2);flex:1 1 auto;min-width:0;word-break:break-word}
  .form-row .en{flex:0 1 auto;color:var(--ink-2);font-size:.88rem;text-align:right;min-width:0}

  .colour-swatch{width:42px;height:42px;border-radius:10px;flex:0 0 auto;border:2px solid var(--line)}

  .number-card{text-align:center;padding:30px 18px}
  .number-card .num{font-size:5rem;font-weight:700;color:var(--primary-2);line-height:1}
  .number-card .mtword{font-size:1.4rem;color:var(--ink);margin-top:8px;font-weight:600}
  .number-card .enword{color:var(--ink-2);margin-top:4px}

  .conj-table{display:grid;grid-template-columns:auto 1fr auto;gap:6px 10px;margin-top:8px}
  .conj-table .row{display:contents}
  .conj-table .person{padding:8px 0;color:var(--ink-2);font-weight:600;font-size:.92rem}
  .conj-table .form-cell{padding:8px 12px;background:var(--bg);border-radius:8px;font-weight:700;color:var(--primary-2)}
  .conj-table .audio-btn{width:36px;height:36px;font-size:.85rem;align-self:center}

  .syllable-card{text-align:center;padding:30px 20px}
  .syllable-card .word{font-size:2rem;font-weight:700;color:var(--primary-2);margin-bottom:12px}
  .syllable-card .split{font-size:1.5rem;color:var(--accent);font-weight:600;letter-spacing:.05em;min-height:1.6em}

  /* Overview podcast player */
  .overview-card{display:grid;grid-template-columns:56px 1fr 24px;gap:14px;align-items:center;padding:18px;background:linear-gradient(135deg,#11827f,#0d6b6a);color:#fff;border:none;border-radius:var(--radius);box-shadow:var(--shadow);text-align:left;width:100%;transition:transform .12s ease;margin-bottom:14px}
  .overview-card:active{transform:scale(.985)}
  .overview-card .icon{width:56px;height:56px;border-radius:16px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:1.7rem}
  .overview-card .meta strong{display:block;font-size:1.1rem;font-weight:700;color:#fff}
  .overview-card .meta span{display:block;font-size:.92rem;color:rgba(255,255,255,.85);margin-top:2px}
  .overview-card .chev{color:rgba(255,255,255,.7);font-size:1.3rem;justify-self:end}

  .player{position:sticky;top:60px;background:var(--card);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow);z-index:5;margin-bottom:14px}
  .player .controls{display:flex;align-items:center;gap:12px}
  .player .play-big{flex:0 0 auto;width:64px;height:64px;border-radius:50%;border:none;background:var(--primary);color:#fff;font-size:1.8rem;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
  .player .play-big:active{transform:scale(.96)}
  .player .skip{flex:0 0 auto;width:44px;height:44px;border-radius:50%;border:2px solid var(--line);background:var(--card);color:var(--ink);font-size:.95rem;font-weight:700}
  .player .meta{flex:1;min-width:0}
  .player .meta .t{font-weight:700;color:var(--ink);font-size:.95rem}
  .player .meta .s{font-size:.82rem;color:var(--ink-2)}
  .player .bar{margin-top:10px;display:flex;align-items:center;gap:8px}
  .player .bar input[type=range]{flex:1;min-width:0;height:38px;-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer}
  .player .bar input[type=range]::-webkit-slider-runnable-track{height:8px;background:var(--line);border-radius:99px}
  .player .bar input[type=range]::-moz-range-track{height:8px;background:var(--line);border-radius:99px}
  .player .bar input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.2);margin-top:-8px;border:2px solid #fff}
  .player .bar input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.2);border:2px solid #fff}
  .player .bar input[type=range]:active::-webkit-slider-thumb{transform:scale(1.15)}
  .player .bar input[type=range]:active::-moz-range-thumb{transform:scale(1.15)}
  .player .bar .time{font-size:.85rem;color:var(--ink-2);font-variant-numeric:tabular-nums;font-weight:600;min-width:32px;text-align:center}
  .player .speed{display:flex;gap:6px;margin-top:8px;justify-content:center}
  .player .speed button{padding:4px 12px;border-radius:99px;border:1px solid var(--line);background:var(--card);font-size:.78rem;font-weight:700;color:var(--ink-2);min-height:32px}
  .player .speed button.active{background:var(--primary);color:#fff;border-color:var(--primary)}

  .chapters{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0 4px;padding:0 2px}
  .chapters .label{flex:0 0 100%;font-size:.72rem;color:var(--ink-2);font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;padding-left:2px}
  .chapters .ch{padding:8px 12px;border-radius:99px;border:1px solid var(--line);background:var(--card);font-size:.82rem;font-weight:600;color:var(--primary-2);min-height:36px;display:inline-flex;align-items:center;gap:4px;line-height:1;text-align:left;max-width:100%}
  .chapters .ch:active{transform:scale(.96)}
  .chapters .ch.active{background:var(--primary);color:#fff;border-color:var(--primary)}
  .chapters .ch .t{font-size:.7rem;opacity:.7;font-variant-numeric:tabular-nums;font-weight:500}

  .transcript{display:flex;flex-direction:column;gap:6px}
  .transcript .seg{padding:10px 12px;border-radius:10px;background:var(--card);border:1px solid transparent;transition:background .2s, border-color .2s, transform .2s;position:relative}
  .transcript .seg.en{color:var(--ink)}
  .transcript .seg.mt{background:#eaf3f3;color:var(--primary-2);font-weight:600;letter-spacing:.005em}
  .transcript .seg.active{background:#fff5d9;border-color:var(--accent);box-shadow:0 1px 0 rgba(0,0,0,.04), 0 4px 14px rgba(224,123,0,.18)}
  .transcript .seg.played{opacity:.6}

  /* Coloured callout kinds */
  .transcript .seg.header{font-size:1.35rem;font-weight:800;text-align:center;padding:18px 12px 6px;color:var(--primary-2);background:transparent;letter-spacing:.005em;line-height:1.25}
  .transcript .seg.rule{background:#e8f5e9;border:none;border-left:5px solid var(--good);padding-left:14px;font-weight:600;color:#1f4d2a}
  .transcript .seg.rule::before{content:"📌  "}
  .transcript .seg.key{background:#fff3d6;border:none;border-left:5px solid var(--accent);padding-left:14px;font-weight:700;color:#5b3b00}
  .transcript .seg.key::before{content:"⭐  "}
  .transcript .seg.tip{background:#f0e6f7;border:none;border-left:5px solid #824aa9;padding-left:14px;color:#3e1c5a}
  .transcript .seg.tip::before{content:"💡  "}
  .transcript .seg.warn{background:#ffe9e0;border:none;border-left:5px solid #c14545;padding-left:14px;color:#5e1a1a}
  .transcript .seg.warn::before{content:"⚠️  "}
  .transcript .seg.win{background:var(--good-bg);color:var(--good);font-weight:800;text-align:center;padding:14px;font-size:1.05rem}
  .transcript .seg.fact{background:#e0effa;border:none;border-left:5px solid #1f6fb2;padding-left:14px;color:#103552;font-weight:600}
  .transcript .seg.fact::before{content:"🎯  "}

  /* Make segments visibly tappable */
  .transcript .seg{cursor:pointer;-webkit-user-select:none;user-select:none}
  .transcript .seg:hover{filter:brightness(.97)}
  .transcript .seg.header{cursor:default}

  /* Inline highlight: **word** -> .hl */
  .transcript .hl{background:linear-gradient(transparent 55%, #ffe98e 55%);padding:0 3px;font-weight:700;color:var(--ink)}
  .transcript .seg.en .hl,
  .transcript .seg.rule .hl,
  .transcript .seg.key .hl,
  .transcript .seg.tip .hl,
  .transcript .seg.fact .hl{color:inherit}

  .done-screen{text-align:center;padding:40px 18px}
  .done-screen .emoji{font-size:4rem;margin-bottom:8px}
  .done-screen h1{font-size:1.5rem;color:var(--good)}
  .done-screen p{color:var(--ink-2)}
  .done-screen .stats{display:flex;justify-content:center;gap:18px;margin:18px 0 24px;flex-wrap:wrap}
  .done-screen .stat{padding:12px 16px;background:var(--card);border-radius:14px;box-shadow:var(--shadow);min-width:90px}
  .done-screen .stat strong{display:block;font-size:1.6rem;color:var(--accent)}
  .done-screen .stat span{font-size:.85rem;color:var(--ink-2)}

  .row{display:flex;align-items:center;gap:12px}
  .row .grow{flex:1;min-width:0}
  .center{text-align:center}
  .muted{color:var(--ink-2);font-size:.95rem}
  .mtline{font-weight:700;color:var(--primary-2);font-size:1.4rem;letter-spacing:.005em}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important}
  }
</style>
</head>
<body>
<main id="app" aria-live="polite"></main>
